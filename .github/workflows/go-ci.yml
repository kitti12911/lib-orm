name: Go CI

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/go-ci.yml"
            - ".golangci.yml"
            - "Makefile"
            - "go.mod"
            - "go.sum"
            - "**/*.go"
    pull_request:
        paths:
            - ".github/workflows/go-ci.yml"
            - ".golangci.yml"
            - "Makefile"
            - "go.mod"
            - "go.sum"
            - "**/*.go"

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Go vet
              run: go vet ./...

            # golangci/golangci-lint-action v9.2.0
            - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
              with:
                  version: v2.12.1
                  args: --timeout=5m

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Test with race detector and coverage
              run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Show coverage
              run: |
                  coverage_total="$(go tool cover -func=coverage.out | tail -n 1)"
                  echo "${coverage_total}"
                  {
                      echo "## Go coverage"
                      echo
                      echo '```text'
                      echo "${coverage_total}"
                      echo '```'
                  } >> "${GITHUB_STEP_SUMMARY}"

    security:
        name: Security
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: govulncheck
              run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

            # aquasecurity/trivy-action v0.36.0
            - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: vuln,secret,misconfig
                  exit-code: 1
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true

            # gitleaks/gitleaks-action v2.3.9
            - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Semgrep
              run: |
                  python3 -m pip install --user semgrep==1.161.0
                  ~/.local/bin/semgrep scan --config=p/golang --config=p/secrets --error
