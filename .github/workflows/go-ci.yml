name: Go CI

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - "CHANGELOG.md"
            - ".golangci.yml"
            - "Makefile"
            - "release.config.cjs"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "**/*.go"
            - "!README.md"
    pull_request:
        paths:
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - "CHANGELOG.md"
            - ".golangci.yml"
            - "Makefile"
            - "release.config.cjs"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "**/*.go"
            - "!README.md"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/image-toolchain@sha256:8a572db163ebfc8be73aad53ae236c8e7e41275aa8dca741f68699cca01dec79
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Lint Go code
              run: ./scripts/ci/go-lint.sh

    test:
        name: Test
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/image-toolchain@sha256:8a572db163ebfc8be73aad53ae236c8e7e41275aa8dca741f68699cca01dec79
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Test with coverage
              run: ./scripts/ci/go-test.sh
              env:
                  GO_TEST_RACE: false

            - name: Show coverage
              run: |
                  coverage_total="$(go tool cover -func=coverage.out | tail -n 1)"
                  echo "${coverage_total}"
                  {
                      echo "## Go coverage"
                      echo
                      echo '```text'
                      echo "${coverage_total}"
                      echo '```'
                  } >> "${GITHUB_STEP_SUMMARY}"

    toolchain-security:
        name: Toolchain Security
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/security-toolchain@sha256:8d9ac476645f6c3deef5269ff9ad35ba3fd52133f748cf57d99490ff2dd4af95
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: govulncheck and Semgrep
              run: ./scripts/ci/security-scan.sh

    security:
        name: Supply Chain Security
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/supply-chain-toolchain@sha256:cba0f82bcc1ef52c2d16c02e846705c656f568b3406e9705ef9b46bfb61667cc
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Trivy and Gitleaks
              run: ./scripts/ci/supply-chain-scan.sh
