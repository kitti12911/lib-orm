name: Release

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/release.yml"
            - ".github/release-please*.json"
            - "CHANGELOG.md"
            - "Makefile"
            - "go.mod"
            - "go.sum"
            - "**/*.go"

permissions:
    contents: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            # googleapis/release-please-action v5.0.0
            - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
              with:
                  release-type: go
