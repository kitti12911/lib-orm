name: Release

on:
    workflow_run:
        workflows:
            - Go CI
        types:
            - completed
        branches:
            - main

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest
        if: github.event.workflow_run.conclusion == 'success'
        container:
            image: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/release-toolchain@sha256:1e3dbdc05352d1a7655f5853c3d1085c7f1f790f949d9bbe39030cde7c3682de
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  ref: main
                  fetch-depth: 0

            - name: Pin tested commit
              run: |
                  git config --global --add safe.directory "$(pwd)"
                  git reset --hard "${RELEASE_SHA}"
              env:
                  RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}

            - name: Publish semantic release
              run: ./scripts/ci/semantic-release-publish.sh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
